# BetterSit Configuration

# Язык сообщений (должен соответствовать файлу в папке languages, например en или ru)
language: en

# Центрировать ли игрока по центру блока при сидении?
center-on-block: true

# Смещение по высоте относительно позиции игрока (может быть отрицательным)
sit-height-offset: -0.2

# Задержка между использованиями /sit (в секундах). 0 - без задержки.
sit-cooldown: 0